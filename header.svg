<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#050010"/>
      <stop offset="28%"  stop-color="#0d0030"/>
      <stop offset="55%"  stop-color="#1a0060"/>
      <stop offset="78%"  stop-color="#003d7a"/>
      <stop offset="100%" stop-color="#050010"/>
    </linearGradient>

    <!-- Name text gradient -->
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#64b5f6"/>
      <stop offset="30%"  stop-color="#ffffff"/>
      <stop offset="70%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#64b5f6"/>
    </linearGradient>

    <!-- Accent line gradient -->
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#050010" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#00b4d8" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#48cae4" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#00b4d8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#050010" stop-opacity="0"/>
    </linearGradient>

    <!-- Scanner gradient -->
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00b4d8" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#00b4d8" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#00b4d8" stop-opacity="0"/>
    </linearGradient>

    <!-- Aurora radial gradients -->
    <radialGradient id="aur1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1a0090" stop-opacity="0.70"/>
      <stop offset="55%"  stop-color="#0d0060" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#050010" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aur2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#004a90" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#002d70" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#050010" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aur3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6a00b0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#050010" stop-opacity="0"/>
    </radialGradient>

    <!-- Shooting star trail gradient -->
    <linearGradient id="shootGrad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="110" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#90caf9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>

    <!-- Shimmer highlight gradient (sweeps across name) -->
    <linearGradient id="shimmerG" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="180" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="38%"  stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="62%"  stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Mask: clips shimmer rect to name text shape -->
    <mask id="nameMask">
      <text x="600" y="152" text-anchor="middle"
            font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
            font-size="80" font-weight="900" letter-spacing="6"
            fill="white">SASHIKANTA SAHOO</text>
    </mask>

    <style>
      /* ── Aurora breathing ── */
      @keyframes aur1 {
        0%,100% { transform:translate(0px,0px)    scale(1.00) }
        33%     { transform:translate(55px,-28px)  scale(1.13) }
        66%     { transform:translate(-28px,18px)  scale(0.92) }
      }
      @keyframes aur2 {
        0%,100% { transform:translate(0px,0px)    scale(1.00) }
        50%     { transform:translate(-65px,30px)  scale(1.20) }
      }
      @keyframes aur3 {
        0%,100% { transform:translate(0px,0px)    scale(1.00) }
        40%     { transform:translate(30px,15px)   scale(1.10) }
        80%     { transform:translate(-15px,-20px) scale(0.90) }
      }

      /* ── Scanner sweep ── */
      @keyframes scan {
        0%   { transform:translateY(-340px); opacity:0   }
        8%   { opacity:.50 }
        92%  { opacity:.50 }
        100% { transform:translateY(680px);  opacity:0   }
      }

      /* ── Star twinkle variants ── */
      @keyframes tw-a { 0%,100%{opacity:.18} 50%{opacity:1.00} }
      @keyframes tw-b { 0%,100%{opacity:.50} 50%{opacity:1.00} }
      @keyframes tw-c { 0%,100%{opacity:.08} 50%{opacity:.90} }
      @keyframes tw-d { 0%,100%{opacity:.38} 50%{opacity:1.00} }
      @keyframes tw-e { 0%,100%{opacity:.28} 50%{opacity:1.00} }
      @keyframes tw-f { 0%,100%{opacity:.55} 50%{opacity:1.00} }

      /* ── Shooting star ── */
      @keyframes shoot {
        0%   { opacity:0; transform:translate(60px,18px)   rotate(32deg) }
        4%   { opacity:0; transform:translate(60px,18px)   rotate(32deg) }
        8%   { opacity:1 }
        24%  { opacity:0; transform:translate(1120px,430px) rotate(32deg) }
        100% { opacity:0; transform:translate(1120px,430px) rotate(32deg) }
      }

      /* ── Name glow pulse ── */
      @keyframes nameGlow {
        0%,100% { filter:drop-shadow(0 0  5px #4fc3f7) drop-shadow(0 0  9px #1565c0) }
        50%     { filter:drop-shadow(0 0 13px #90caf9) drop-shadow(0 0 24px #1976d2)
                         drop-shadow(0 0 38px #0d47a1) }
      }

      /* ── Shimmer sweep across name ── */
      @keyframes shimmer {
        0%   { transform:translateX(-200px) }
        100% { transform:translateX(1400px) }
      }

      /* ── Accent line glow pulse ── */
      @keyframes linePulse {
        0%,100% { filter:drop-shadow(0 0 2px #00b4d8) }
        50%     { filter:drop-shadow(0 0 8px #48cae4) drop-shadow(0 0 16px #0096c7) }
      }

      /* ── Corner bracket draw-in ── */
      @keyframes drawBr { to { stroke-dashoffset:0 } }

      /* ── Text / element reveals ── */
      @keyframes fadeIn   { from{opacity:0} to{opacity:1}   }
      @keyframes fadeIn85 { from{opacity:0} to{opacity:.85} }

      /* Aurora */
      .aur1 { animation: aur1 13s ease-in-out infinite }
      .aur2 { animation: aur2 17s ease-in-out infinite }
      .aur3 { animation: aur3 11s ease-in-out 2s infinite }

      /* Scanner */
      .scanner { animation: scan 5s 0.5s infinite }

      /* Stars */
      .sa { animation: tw-a 2.3s  0.0s infinite }
      .sb { animation: tw-b 1.7s  0.4s infinite }
      .sc { animation: tw-c 3.1s  0.8s infinite }
      .sd { animation: tw-d 2.6s  0.2s infinite }
      .se { animation: tw-e 1.9s  1.1s infinite }
      .sf { animation: tw-f 2.8s  0.6s infinite }
      .sg { animation: tw-a 3.4s  0.3s infinite }
      .sh { animation: tw-b 2.1s  0.9s infinite }
      .si { animation: tw-c 2.7s  0.5s infinite }
      .sj { animation: tw-d 1.6s  1.3s infinite }
      .sk { animation: tw-e 2.9s  0.7s infinite }
      .sl { animation: tw-e 3.2s  1.5s infinite }
      .sm { animation: tw-b 2.4s  0.1s infinite }
      .sn { animation: tw-d 2.2s  1.0s infinite }
      .so { animation: tw-a 3.0s  0.4s infinite }
      .sp { animation: tw-d 2.5s  0.8s infinite }
      .sq { animation: tw-d 1.8s  0.3s infinite }
      .sr { animation: tw-a 2.9s  1.2s infinite }
      .ss { animation: tw-b 2.0s  0.6s infinite }
      .st { animation: tw-c 2.2s  0.7s infinite }
      .su { animation: tw-a 3.5s  1.4s infinite }
      .sv { animation: tw-e 1.8s  0.5s infinite }
      .sw { animation: tw-b 2.7s  1.1s infinite }
      .sx { animation: tw-d 3.0s  0.2s infinite }
      .sy { animation: tw-f 2.1s  0.9s infinite }

      /* Shooting star */
      .shooter { animation: shoot 11s 4s infinite }

      /* Name: fade-in once, then glow-pulse forever */
      .name-text {
        opacity: 0;
        animation: fadeIn   1.2s 0.0s forwards,
                   nameGlow 3.2s 2.2s infinite;
      }

      /* Shimmer sweep */
      .shimmer-bar { animation: shimmer 4s 3s infinite }

      /* Accent line: fade-in once, then glow-pulse forever */
      .line-accent {
        opacity: 0;
        animation: fadeIn    1.5s 0.8s forwards,
                   linePulse 2.8s 2.6s infinite;
      }

      /* Subtitle + tech stack */
      .subtitle-text { opacity:0; animation: fadeIn   1.4s 0.6s forwards }
      .tech-text     { opacity:0; animation: fadeIn85 1.6s 1.0s forwards }

      /* Bracket draw-in */
      .bracket {
        stroke-dasharray:  62;
        stroke-dashoffset: 62;
        animation: drawBr 0.55s ease-out forwards;
      }
      .br1 { animation-delay: 1.7s }
      .br2 { animation-delay: 1.9s }
      .br3 { animation-delay: 2.1s }
      .br4 { animation-delay: 2.3s }
    </style>
  </defs>

  <!-- ── Background ── -->
  <rect width="1200" height="340" fill="url(#bg)"/>

  <!-- ── Aurora blobs ── -->
  <ellipse class="aur1" cx="310" cy="155" rx="370" ry="210" fill="url(#aur1)"/>
  <ellipse class="aur2" cx="890" cy="145" rx="410" ry="225" fill="url(#aur2)"/>
  <ellipse class="aur3" cx="600" cy="200" rx="260" ry="140" fill="url(#aur3)"/>

  <!-- ── Subtle grid ── -->
  <g stroke="#3a5f8a" stroke-width="0.4" opacity="0.14">
    <line x1="0"    y1="68"  x2="1200" y2="68"/>
    <line x1="0"    y1="136" x2="1200" y2="136"/>
    <line x1="0"    y1="204" x2="1200" y2="204"/>
    <line x1="0"    y1="272" x2="1200" y2="272"/>
    <line x1="150"  y1="0"   x2="150"  y2="340"/>
    <line x1="300"  y1="0"   x2="300"  y2="340"/>
    <line x1="450"  y1="0"   x2="450"  y2="340"/>
    <line x1="600"  y1="0"   x2="600"  y2="340"/>
    <line x1="750"  y1="0"   x2="750"  y2="340"/>
    <line x1="900"  y1="0"   x2="900"  y2="340"/>
    <line x1="1050" y1="0"   x2="1050" y2="340"/>
  </g>

  <!-- ── Scanner sweep ── -->
  <rect class="scanner" x="0" y="0" width="1200" height="340" fill="url(#scanGrad)"/>

  <!-- ── Stars / particles ── -->
  <!-- Row 1 — top band -->
  <circle class="sa" cx="42"   cy="22"  r="1.6" fill="#90caf9"/>
  <circle class="sb" cx="118"  cy="55"  r="1.2" fill="#ffffff"/>
  <circle class="sc" cx="220"  cy="18"  r="1.8" fill="#64b5f6"/>
  <circle class="sd" cx="355"  cy="42"  r="1.3" fill="#90caf9"/>
  <circle class="se" cx="480"  cy="30"  r="1.5" fill="#ffffff"/>
  <circle class="sf" cx="590"  cy="15"  r="1.1" fill="#48cae4"/>
  <circle class="sg" cx="700"  cy="48"  r="1.7" fill="#90caf9"/>
  <circle class="sh" cx="820"  cy="25"  r="1.4" fill="#ffffff"/>
  <circle class="si" cx="960"  cy="38"  r="1.9" fill="#64b5f6"/>
  <circle class="sj" cx="1060" cy="20"  r="1.3" fill="#90caf9"/>
  <circle class="sk" cx="1140" cy="50"  r="1.6" fill="#ffffff"/>
  <!-- Row 2 — upper-mid -->
  <circle class="sl" cx="85"   cy="110" r="1.2" fill="#48cae4"/>
  <circle class="sm" cx="200"  cy="95"  r="1.5" fill="#90caf9"/>
  <circle class="st" cx="430"  cy="80"  r="1.1" fill="#64b5f6"/>
  <circle class="su" cx="770"  cy="72"  r="1.4" fill="#ffffff"/>
  <circle class="sn" cx="1020" cy="90"  r="1.4" fill="#64b5f6"/>
  <circle class="so" cx="1130" cy="105" r="1.7" fill="#ffffff"/>
  <!-- Mid-field -->
  <circle class="sv" cx="145"  cy="185" r="1.0" fill="#90caf9"/>
  <circle class="sw" cx="1055" cy="178" r="1.1" fill="#48cae4"/>
  <circle class="sx" cx="310"  cy="230" r="1.2" fill="#64b5f6"/>
  <circle class="sy" cx="890"  cy="240" r="1.0" fill="#90caf9"/>
  <!-- Lower dots -->
  <circle class="sp" cx="55"   cy="260" r="1.3" fill="#90caf9"/>
  <circle class="sq" cx="165"  cy="285" r="1.1" fill="#48cae4"/>
  <circle class="sr" cx="1045" cy="270" r="1.5" fill="#64b5f6"/>
  <circle class="ss" cx="1155" cy="290" r="1.2" fill="#90caf9"/>

  <!-- ── Shooting star ── -->
  <line class="shooter" x1="0" y1="0" x2="110" y2="0"
        stroke="url(#shootGrad)" stroke-width="2" stroke-linecap="round"/>

  <!-- ── Corner brackets (draw-in animation) ── -->
  <path class="bracket br1" pathLength="60" d="M20,52 L20,20 L52,20"
        stroke="#00b4d8" stroke-width="2.2" fill="none" opacity="0.75"/>
  <path class="bracket br2" pathLength="60" d="M1148,20 L1180,20 L1180,52"
        stroke="#00b4d8" stroke-width="2.2" fill="none" opacity="0.75"/>
  <path class="bracket br3" pathLength="60" d="M20,288 L20,320 L52,320"
        stroke="#00b4d8" stroke-width="2.2" fill="none" opacity="0.75"/>
  <path class="bracket br4" pathLength="60" d="M1148,320 L1180,320 L1180,288"
        stroke="#00b4d8" stroke-width="2.2" fill="none" opacity="0.75"/>

  <!-- ── Name ── -->
  <text class="name-text" x="600" y="152"
        text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="80" font-weight="900" letter-spacing="6"
        fill="url(#nameGrad)">SASHIKANTA SAHOO</text>

  <!-- ── Shimmer sweep (masked to name text shape) ── -->
  <rect class="shimmer-bar" x="-180" y="82" width="180" height="82"
        fill="url(#shimmerG)" mask="url(#nameMask)"/>

  <!-- ── Accent glow line ── -->
  <rect class="line-accent" x="200" y="168" width="800" height="2"
        fill="url(#lineGrad)" rx="1"/>

  <!-- ── Subtitle ── -->
  <text class="subtitle-text" x="600" y="210"
        text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="18" font-weight="400" letter-spacing="2"
        fill="#90e0ef">Senior Full Stack Engineer  ·  Healthcare Tech  ·  AWS  ·  7+ Years in Production</text>

  <!-- ── Tech stack ── -->
  <text class="tech-text" x="600" y="252"
        text-anchor="middle"
        font-family="'JetBrains Mono','Courier New',monospace"
        font-size="13" font-weight="400" letter-spacing="5"
        fill="#58A6FF">React.js  ·  Next.js  ·  Node.js  ·  TypeScript  ·  AWS  ·  Docker  ·  Kubernetes</text>

  <!-- ── Bottom wave ── -->
  <path d="M0,295 Q120,278 240,292 Q360,306 480,292 Q600,278 720,292 Q840,306 960,292 Q1080,278 1200,292 L1200,340 L0,340 Z"
        fill="#0d1117" opacity="0.95"/>
  <path d="M0,308 Q150,294 300,308 Q450,322 600,308 Q750,294 900,308 Q1050,322 1200,308 L1200,340 L0,340 Z"
        fill="#0d1117"/>
</svg>
